version: '3.9'

services:
  # ── Base de datos ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: unphu_tesis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unphu_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unphu_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-unphu_tesis_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-unphu_user} -d ${POSTGRES_DB:-unphu_tesis_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unphu_tesis_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-unphu_user}:${POSTGRES_PASSWORD:-unphu_pass_2024}@postgres:5432/${POSTGRES_DB:-unphu_tesis_db}
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Frontend Next.js ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    container_name: unphu_tesis_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: unphu_tesis_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_uploads:
